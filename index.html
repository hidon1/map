<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>מפת העולם - מידע מדינתי</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="" />
  <style>
    :root{--bg:#f8f4ea;--panel:#fff;--line:#e6decf;--text:#171717;--muted:#666;--accent:#1459c7;--shadow:0 12px 28px rgba(48,39,18,.12);--radius:16px}
    *{box-sizing:border-box} html,body{height:100%}
    body{margin:0;font-family:"Heebo",Arial,sans-serif;color:var(--text);background:var(--bg)}
    .app{display:grid;grid-template-columns:330px 1fr;gap:14px;height:100vh;padding:14px;transition:.25s ease}
    .app.map-focus{grid-template-columns:0 1fr}
    .sidebar,.main{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow)}
    .sidebar{display:flex;flex-direction:column;min-height:0;transition:.25s ease}
    .app.map-focus .sidebar{opacity:0;pointer-events:none;transform:translateX(15px)}
    .sidebarHeader{padding:16px;border-bottom:1px solid var(--line)}
    .sidebarHeader h1{margin:0 0 8px;font-size:1.2rem}
    .sidebarHeader p{margin:0 0 10px;color:var(--muted);font-size:.93rem;line-height:1.45}
    .searchInput{width:100%;padding:11px;border:1px solid #d8d0c3;border-radius:11px;font-family:inherit}
    .countryList{padding:12px;display:grid;grid-template-columns:1fr 1fr;gap:9px;overflow:auto}
    .countryBtn{border:1px solid #e4ddcf;background:#fff;border-radius:11px;padding:10px 8px;font-weight:700;font-family:inherit;cursor:pointer}
    .countryBtn.active{border-color:#85a9eb;background:#eef5ff;color:#134da8}
    .sidebarFooter{margin-top:auto;padding:12px 14px;border-top:1px solid var(--line);font-size:.82rem;color:var(--muted)}
    .main{display:grid;grid-template-rows:auto 1fr;min-height:0}
    .mainHeader{display:flex;justify-content:space-between;align-items:center;padding:12px 14px;border-bottom:1px solid var(--line)}
    .viewBtn{border:1px solid #c4d4f2;background:#fff;color:#17489f;border-radius:11px;padding:9px 11px;font-weight:700;font-family:inherit;cursor:pointer}
    .mainContent{display:grid;grid-template-columns:1fr 1.25fr;min-height:0}
    .app.map-focus .mainContent{grid-template-columns:1fr}
    .app.map-focus .infoPanel{display:none}
    .infoPanel{border-right:1px solid var(--line);padding:14px;overflow:auto;background:#fffdf7}
    .card{background:#fff;border:1px solid #e9e0d2;border-radius:14px;padding:12px;margin-bottom:10px}
    .card h2,.card h3{margin:0 0 8px}
    .row{display:flex;justify-content:space-between;gap:8px;padding:6px 0;border-bottom:1px dashed #e8decd;font-size:.93rem}
    .row:last-child{border-bottom:none}
    .k{color:#6a6155}.v{font-weight:700;text-align:left}
    .mapWrap{position:relative;min-height:0}
    #map{width:100%;height:100%;min-height:540px;background:#f2f2f2}
    .app.map-focus #map{min-height:calc(100vh - 110px)}
    .mapBanner{position:absolute;top:14px;right:14px;z-index:600;max-width:360px;background:#fffffff2;border:1px solid #ded6c8;border-radius:12px;padding:10px;display:none}
    .mapBanner.open{display:block}
    .country-label{background:transparent!important;border:none!important;box-shadow:none!important}
    .country-bar{width:30px;height:4px;border-radius:999px;background:linear-gradient(90deg,#195fd1,#4c9dff);box-shadow:0 2px 7px rgba(20,89,199,.24);cursor:pointer}
    .country-bar.active{background:linear-gradient(90deg,#0f4ab6,#2d83f0);box-shadow:0 0 0 2px rgba(20,89,199,.2),0 2px 10px rgba(20,89,199,.28)}
    @media (max-width:1000px){.mainContent{grid-template-columns:1fr}.infoPanel{border-right:none;border-bottom:1px solid var(--line)}}
    @media (max-width:850px){.app{grid-template-columns:1fr;height:auto;min-height:100vh}.sidebar{display:none}.countryList{grid-template-columns:repeat(3,1fr)}}
  </style>
</head>
<body>
  <div class="app" id="app">
    <aside class="sidebar">
      <div class="sidebarHeader">
        <h1>מפת העולם</h1>
        <p>אין יותר צביעה כחולה של כל המדינה. רק פס כחול קטן לכל מדינה, ולחיצה עליו פותחת את כל הנתונים.</p>
        <input id="searchInput" class="searchInput" type="text" placeholder="חפש מדינה..." list="countriesDatalist" />
        <datalist id="countriesDatalist"></datalist>
      </div>
      <div class="countryList" id="countryList"></div>
      <div class="sidebarFooter">מוצגים נתונים לכל מדינות העולם מתוך Rest Countries וגבולות מפה גלובליים.</div>
    </aside>

    <section class="main">
      <div class="mainHeader">
        <div>
          <div><strong>לוח מידע גלובלי</strong></div>
          <div style="color:#666;font-size:.9rem">בחירת פס כחול מעדכנת את כל נתוני המדינה</div>
        </div>
        <button id="toggleMapView" class="viewBtn" type="button">🗺️ הגדל מפה</button>
      </div>
      <div class="mainContent">
        <div class="infoPanel" id="infoPanel"></div>
        <div class="mapWrap">
          <div class="mapBanner" id="mapBanner"></div>
          <div id="map"></div>
        </div>
      </div>
    </section>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
  <script>
    const app = document.getElementById("app");
    const countryListEl = document.getElementById("countryList");
    const infoPanel = document.getElementById("infoPanel");
    const searchInput = document.getElementById("searchInput");
    const countriesDatalist = document.getElementById("countriesDatalist");
    const mapBanner = document.getElementById("mapBanner");
    const toggleMapViewBtn = document.getElementById("toggleMapView");

    let map;
    let activeCountryKey = "";
    let countries = {};
    let orderedKeys = [];
    const layers = {};
    const barElements = {};

    const val = (v, empty = "אין נתון") => (v === undefined || v === null || v === "" ? empty : v);

    function renderButtons() {
      countryListEl.innerHTML = orderedKeys.map((key) => `<button class="countryBtn ${key === activeCountryKey ? "active" : ""}" data-key="${key}">${countries[key].name}</button>`).join("");
      countryListEl.querySelectorAll(".countryBtn").forEach((btn) => btn.addEventListener("click", () => selectCountry(btn.dataset.key, true)));
    }

    function renderSearchOptions() {
      countriesDatalist.innerHTML = orderedKeys.map((key) => `<option value="${countries[key].name}"></option>`).join("");
    }

    function updateActiveBar() {
      Object.entries(barElements).forEach(([key, el]) => {
        if (!el) return;
        el.classList.toggle("active", key === activeCountryKey);
      });
      document.querySelectorAll(".countryBtn").forEach((btn) => btn.classList.toggle("active", btn.dataset.key === activeCountryKey));
    }

    function renderInfo(key) {
      const c = countries[key];
      infoPanel.innerHTML = `
        <div class="card"><h2>${c.name}</h2><div style="color:#555">${val(c.summary)}</div></div>
        <div class="card"><h3>נתונים בסיסיים</h3>
          <div class="row"><div class="k">בירה</div><div class="v">${val(c.capital)}</div></div>
          <div class="row"><div class="k">אוכלוסייה</div><div class="v">${val(c.population)}</div></div>
          <div class="row"><div class="k">שטח</div><div class="v">${val(c.area)}</div></div>
          <div class="row"><div class="k">יבשת / אזור</div><div class="v">${val(c.region)}</div></div>
          <div class="row"><div class="k">שפות</div><div class="v">${val(c.languages)}</div></div>
          <div class="row"><div class="k">מטבע</div><div class="v">${val(c.currency)}</div></div>
        </div>`;

      mapBanner.innerHTML = `<strong>${c.name}</strong><div style="margin-top:4px;color:#444">בירה: ${val(c.capital)} · אוכלוסייה: ${val(c.population)}</div>`;
      mapBanner.classList.add("open");
    }

    function selectCountry(key, fly = false) {
      if (!countries[key]) return;
      activeCountryKey = key;
      searchInput.value = countries[key].name;
      renderInfo(key);
      updateActiveBar();
      if (fly && layers[key]) {
        map.fitBounds(layers[key].getBounds().pad(0.7), { maxZoom: 6, animate: true });
      }
    }

    function normalizeRestCountry(country) {
      const key = (country.cca3 || country.cca2 || country.name?.common || "").toLowerCase();
      const currencies = country.currencies ? Object.values(country.currencies).map((c) => c.name).join(", ") : "";
      const langs = country.languages ? Object.values(country.languages).join(", ") : "";
      return {
        key,
        name: country.translations?.heb?.common || country.name?.common || key.toUpperCase(),
        searchNames: [country.name?.common, country.name?.official, country.translations?.heb?.common, country.translations?.heb?.official, country.cca2, country.cca3].filter(Boolean).map((x) => String(x).toLowerCase()),
        capital: Array.isArray(country.capital) ? country.capital.join(", ") : country.capital,
        population: country.population ? new Intl.NumberFormat("he-IL").format(country.population) : "",
        area: country.area ? `${new Intl.NumberFormat("he-IL").format(Math.round(country.area))} קמ״ר` : "",
        region: [country.region, country.subregion].filter(Boolean).join(" / "),
        languages: langs,
        currency: currencies,
        summary: `דגל: ${country.flag || "🏳️"}`,
      };
    }

    function findCountryBySearch(text) {
      const q = text.trim().toLowerCase();
      if (!q) return null;
      return orderedKeys.find((key) => countries[key].searchNames.some((n) => n.includes(q))) || null;
    }

    async function loadWorldData() {
      const [restRes, geoRes] = await Promise.all([
        fetch("https://restcountries.com/v3.1/all?fields=name,translations,capital,population,area,currencies,languages,region,subregion,cca2,cca3,flag"),
        fetch("https://raw.githubusercontent.com/datasets/geo-countries/master/data/countries.geojson"),
      ]);

      const rest = await restRes.json();
      const geo = await geoRes.json();

      rest.forEach((r) => {
        const c = normalizeRestCountry(r);
        countries[c.key] = c;
      });

      L.geoJSON(geo, {
        style: { color: "transparent", weight: 0, fillOpacity: 0, interactive: false },
        onEachFeature: (feature, layer) => {
          const props = feature.properties || {};
          const iso = (props.ISO_A3 || props.ADM0_A3 || props.ISO3 || "").toLowerCase();
          const key = countries[iso] ? iso : null;
          if (!key) return;

          layers[key] = layer;
          const center = layer.getBounds().getCenter();
          const icon = L.divIcon({ className: "country-label", html: `<div class="country-bar" data-key="${key}" title="פתח נתונים"></div>`, iconSize: [30, 8], iconAnchor: [15, 4] });
          const marker = L.marker(center, { icon, interactive: true }).addTo(map);
          marker.on("add", () => {
            const el = marker.getElement()?.querySelector(".country-bar");
            if (!el) return;
            barElements[key] = el;
            el.addEventListener("click", (ev) => { ev.stopPropagation(); selectCountry(key, true); });
          });
        },
      }).addTo(map);

      orderedKeys = Object.keys(layers).sort((a, b) => countries[a].name.localeCompare(countries[b].name, "he"));
      renderButtons();
      renderSearchOptions();
      selectCountry(orderedKeys[0], true);
    }

    function initMap() {
      map = L.map("map", { zoomControl: true, minZoom: 2, maxZoom: 8, worldCopyJump: true }).setView([20, 0], 2.2);
      L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", { maxZoom: 19, attribution: "© OpenStreetMap" }).addTo(map);
    }

    toggleMapViewBtn.addEventListener("click", () => {
      app.classList.toggle("map-focus");
      const expanded = app.classList.contains("map-focus");
      toggleMapViewBtn.textContent = expanded ? "↩️ חזרה לרגיל" : "🗺️ הגדל מפה";
      setTimeout(() => map.invalidateSize(), 250);
    });

    searchInput.addEventListener("change", () => {
      const key = findCountryBySearch(searchInput.value);
      if (key) selectCountry(key, true);
    });
    searchInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter") {
        const key = findCountryBySearch(searchInput.value);
        if (key) selectCountry(key, true);
      }
    });

    initMap();
    loadWorldData().catch(() => {
      infoPanel.innerHTML = '<div class="card"><h3>שגיאת טעינה</h3><div>לא ניתן לטעון כרגע נתוני עולם.</div></div>';
    });
  </script>
</body>
</html>
