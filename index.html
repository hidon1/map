<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>מפת המזרח התיכון - מידע מדינתי</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;700;800&display=swap" rel="stylesheet" />

  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    crossorigin=""
  />

  <style>
    :root{
      --bg:#f8f4ea;
      --bg-soft:#fffdf7;
      --panel:#ffffff;
      --line:#e6decf;
      --text:#171717;
      --muted:#686868;
      --accent:#1459c7;
      --accent-soft:#edf3ff;
      --shadow:0 12px 28px rgba(48, 39, 18, .12);
      --radius:18px;
    }

    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      font-family:"Heebo",Arial,Helvetica,sans-serif;
      color:var(--text);
      background:radial-gradient(circle at top right, rgba(255,255,255,.7), transparent 34%), var(--bg);
    }

    .app{
      display:grid;
      grid-template-columns:360px 1fr;
      gap:16px;
      height:100vh;
      padding:16px;
      transition:.3s ease;
    }

    .app.map-focus{
      grid-template-columns:0 1fr;
    }

    .sidebar,.main{
      background:var(--panel);
      border:1px solid var(--line);
      border-radius:var(--radius);
      overflow:hidden;
      box-shadow:var(--shadow);
    }

    .sidebar{
      display:flex;
      flex-direction:column;
      min-height:0;
      transition:.28s ease;
    }

    .app.map-focus .sidebar{
      opacity:0;
      transform:translateX(16px);
      pointer-events:none;
    }

    .sidebarHeader{
      padding:18px;
      border-bottom:1px solid var(--line);
      background:linear-gradient(180deg, #fff, #fffcf4);
    }

    .sidebarHeader h1{margin:0 0 8px; font-size:1.35rem; font-weight:800}
    .sidebarHeader p{margin:0; color:var(--muted); line-height:1.55; font-size:.95rem}
    .searchBox{margin-top:14px}

    .searchInput{
      width:100%;
      padding:12px 14px;
      border-radius:12px;
      border:1px solid #d8d0c3;
      background:#fff;
      color:#222;
      outline:none;
      font-size:.95rem;
      font-family:inherit;
    }

    .searchInput:focus{border-color:#8aade8; box-shadow:0 0 0 3px rgba(20,89,199,.14)}

    .countryList{
      padding:14px;
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
      overflow:auto;
    }

    .countryBtn{
      border:none;
      border-radius:14px;
      padding:12px 10px;
      color:#1f1f1f;
      background:#fff;
      cursor:pointer;
      transition:.22s ease;
      border:1px solid #e7dece;
      font-size:.95rem;
      font-family:inherit;
      font-weight:700;
    }

    .countryBtn:hover,
    .countryBtn.active{
      transform:translateY(-2px);
      border-color:#8ba9dd;
      box-shadow:0 8px 16px rgba(20,89,199,.15);
      background:#f4f8ff;
      color:#0b419b;
    }

    .sidebarFooter{margin-top:auto; padding:14px 16px 18px; border-top:1px solid var(--line); color:var(--muted); font-size:.82rem; line-height:1.5}

    .main{display:grid; grid-template-rows:auto 1fr; min-height:0}

    .mainHeader{
      display:flex;
      justify-content:space-between;
      align-items:center;
      padding:14px 16px;
      border-bottom:1px solid var(--line);
      background:linear-gradient(180deg, #fff, #fffaf0);
      gap:12px;
    }

    .mainHeader .t1{font-weight:800; font-size:1.05rem}
    .mainHeader .t2{color:var(--muted); font-size:.9rem; margin-top:4px}

    .viewBtn{
      border:1px solid #c4d4f2;
      background:#fff;
      color:#17489f;
      font-family:inherit;
      font-weight:700;
      border-radius:12px;
      padding:10px 12px;
      cursor:pointer;
      transition:.22s ease;
    }

    .viewBtn:hover{transform:translateY(-1px); box-shadow:0 6px 14px rgba(20,89,199,.15)}

    .mainContent{display:grid; grid-template-columns:1.1fr .9fr; min-height:0}

    .mapWrap{position:relative; min-height:0;}

    #map{width:100%; height:100%; min-height:520px; background:#f5f3ee}

    .mapBanner{
      position:absolute;
      right:16px;
      top:16px;
      width:min(430px, calc(100% - 32px));
      max-height:calc(100% - 32px);
      overflow:auto;
      z-index:500;
      background:#ffffffee;
      border:1px solid #ded6c8;
      border-radius:16px;
      box-shadow:var(--shadow);
      backdrop-filter: blur(6px);
      padding:14px;
      transform:translateY(6px);
      opacity:0;
      pointer-events:none;
      transition:.25s ease;
    }

    .mapBanner.open{opacity:1; transform:translateY(0); pointer-events:auto}
    .mapBanner h3{margin:0 0 8px; font-size:1.18rem}
    .mapBanner p{margin:0 0 12px; color:#444; line-height:1.5}

    .miniRows{display:grid; gap:8px}
    .miniRow{display:flex; justify-content:space-between; gap:12px; padding-bottom:7px; border-bottom:1px dashed #d8d1c4; font-size:.9rem}
    .miniRow:last-child{border-bottom:none; padding-bottom:0}

    .infoPanel{border-right:1px solid var(--line); overflow:auto; padding:16px; background:var(--bg-soft)}

    .hero{background:#fff; border:1px solid #e8dfd1; border-radius:16px; padding:16px; margin-bottom:14px; animation:rise .25s ease}
    .hero h2{margin:0 0 8px; font-size:1.45rem; font-weight:800}
    .hero p{margin:0; color:#2a2a2a; line-height:1.6}

    .grid{display:grid; grid-template-columns:1fr 1fr; gap:12px}
    .card{background:#fff; border:1px solid #e8dfd1; border-radius:16px; padding:14px; animation:rise .25s ease}
    .card.full{grid-column:1 / -1}
    .card h3{margin:0 0 10px; font-size:1rem}

    .rows{display:grid; gap:8px}
    .row{display:flex; justify-content:space-between; gap:10px; padding:8px 0; border-bottom:1px dashed #e6dccd}
    .row:last-child{border-bottom:none}
    .k{color:#6a6155; font-size:.92rem}
    .v{color:#111; font-weight:700; text-align:left; font-size:.93rem}

    .chips{display:flex; flex-wrap:wrap; gap:8px}
    .chip{padding:7px 10px; border-radius:999px; background:#fff; border:1px solid #d8cfbf; color:#212121; font-size:.84rem}
    .note{margin-top:12px; color:var(--muted); line-height:1.55; font-size:.82rem}

    .leaflet-container{font-family:"Heebo",Arial,Helvetica,sans-serif}
    .country-label{background:transparent !important; border:none !important; box-shadow:none !important}

    .country-label-wrap{
      display:inline-flex;
      flex-direction:column;
      align-items:center;
      width:max-content;
      gap:4px;
      pointer-events:auto;
      user-select:none;
      transform:translateY(-6px);
    }

    .country-name{color:#111; font-weight:800; font-size:14px; line-height:1; white-space:nowrap; text-shadow:0 1px 0 rgba(255,255,255,.7)}

    .country-bar{
      width:100%;
      height:4px;
      border-radius:999px;
      background:linear-gradient(90deg,#195fd1,#4c9dff);
      border:none;
      box-shadow:0 2px 8px rgba(20,89,199,.25);
      cursor:pointer;
      transition:.18s ease;
    }

    .country-bar:hover{transform:scale(1.05); filter:brightness(1.04)}
    .country-label-wrap.active .country-bar{background:linear-gradient(90deg,#0f4ab6,#2d83f0); box-shadow:0 0 0 2px rgba(20,89,199,.18), 0 3px 10px rgba(20,89,199,.28)}

    @keyframes rise{from{opacity:.2; transform:translateY(5px)} to{opacity:1; transform:translateY(0)}}

    @media (max-width:1100px){
      .mainContent{grid-template-columns:1fr}
      .infoPanel{border-right:none; border-bottom:1px solid var(--line)}
    }

    @media (max-width:900px){
      .app{grid-template-columns:1fr; height:auto; min-height:100vh}
      .app.map-focus{grid-template-columns:1fr}
      .sidebar{display:none}
      .countryList{grid-template-columns:repeat(3,1fr)}
      .mapBanner{position:static; margin:8px 8px 0; width:calc(100% - 16px)}
    }

    @media (max-width:650px){
      .countryList{grid-template-columns:1fr 1fr}
      .grid{grid-template-columns:1fr}
    }
  </style>
</head>
<body>
  <div class="app" id="app">
    <aside class="sidebar">
      <div class="sidebarHeader">
        <h1>מפת המזרח התיכון</h1>
        <p>
          לחץ על הפס שמתחת לשם המדינה, או חפש למעלה, כדי לפתוח את כל המידע.
        </p>

        <div class="searchBox">
          <input
            id="searchInput"
            class="searchInput"
            type="text"
            placeholder="חפש מדינה..."
            list="countriesDatalist"
          />
          <datalist id="countriesDatalist"></datalist>
        </div>
      </div>

      <div class="countryList" id="countryList"></div>

      <div class="sidebarFooter">
        שמות המדינות נשארים קבועים על המפה, והלחיצה על הפס הקטן (בגודל המילה) תפתח את המידע המלא.
      </div>
    </aside>

    <section class="main">
      <div class="mainHeader">
        <div>
          <div class="t1">לוח מידע אזורי</div>
          <div class="t2">בחירת מדינה מעדכנת את הפאנל ואת הבאנר שעל המפה</div>
        </div>
        <button id="toggleMapView" class="viewBtn" type="button">🗺️ מצב מפה מורחב</button>
      </div>

      <div class="mainContent">
        <div class="infoPanel" id="infoPanel"></div>
        <div class="mapWrap">
          <div class="mapBanner" id="mapBanner"></div>
          <div id="map"></div>
        </div>
      </div>
    </section>
  </div>

            <h3>בריתות / שיוכים</h3>
            <div class="chips">
              ${c.alliances.map(x => `<span class="chip">${x}</span>`).join("")}
            </div>
          </div>

          <div class="card full">
            <h3>אינטרסים מרכזיים</h3>
            <div class="chips">
              ${c.interests.map(x => `<span class="chip">${x}</span>`).join("")}
            </div>
          </div>
        </div>

        <div class="note">
          החיפוש למעלה מאפשר לפתוח מדינה גם בלי ללחוץ על המפה.
        </div>
      `;
      renderMapBanner(key);
    }

    function resetLayerStyles() {
      Object.entries(layers).forEach(([key, layer]) => {
        const isActive = key === activeCountryKey;
        layer.setStyle({
          color: isActive ? "#1b64d1" : "transparent",
          weight: isActive ? 2 : 0,
          fillColor: isActive ? "#669ef1" : "transparent",
          fillOpacity: isActive ? 0.12 : 0
        });
      });
    }

    function findCountryBySearch(text) {
      const q = text.trim().toLowerCase();
      if (!q) return null;

      for (const [key, country] of Object.entries(countries)) {
        if (country.searchNames.some(n => n.toLowerCase() === q)) return key;
      }

      for (const [key, country] of Object.entries(countries)) {
        if (country.searchNames.some(n => n.toLowerCase().includes(q))) return key;
      }

      return null;
    }

    function selectCountry(key, fly = false) {
      activeCountryKey = key;
      updateActiveButton();
      renderInfo(key);
      resetLayerStyles();
      updateActiveLabels();
      searchInput.value = countries[key].name;

      const c = countries[key];
      if (fly && map) {
        map.flyTo(c.center, c.zoom, { duration: 0.8 });
      }
    }

    function createCountryLabel(key, country) {
      const icon = L.divIcon({
        className: "country-label",
        html: `
          <div class="country-label-wrap" data-key="${key}">
            <div class="country-name">${country.name}</div>
            <div class="country-bar" title="פתח מידע על ${country.name}"></div>
          </div>
        `,
        iconSize: [120, 34],
        iconAnchor: [60, 17]
      });

      const labelCenter = [country.center[0] + (country.labelOffset?.[0] || 0), country.center[1] + (country.labelOffset?.[1] || 0)];
      const marker = L.marker(labelCenter, { icon, interactive: true }).addTo(map);

      marker.on("add", () => {
        const el = marker.getElement();
        if (!el) return;
        const bar = el.querySelector(".country-bar");
        if (!bar) return;

        bar.addEventListener("click", (ev) => {
          ev.stopPropagation();
          selectCountry(key, true);
        });
      });

      labelMarkers[key] = marker;
    }

    function initMap() {
      map = L.map("map", { zoomControl: true, minZoom: 3, maxZoom: 9, zoomSnap: 0.25, zoomDelta: 0.5, worldCopyJump: false }).setView([26.8, 42.5], 5.2);

      map.setMaxBounds([[ -2.5, 19.5 ], [ 41.5, 67.5 ]]);
      map.options.maxBoundsViscosity = 0.8;

      L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", { maxZoom: 19, attribution: "© OpenStreetMap" }).addTo(map);

      Object.entries(mapAreas).forEach(([key, coords]) => {
        const c = countries[key];
        const polygon = L.polygon(coords, {
          color: "transparent",
          weight: 0,
          fillColor: "transparent",
          fillOpacity: 0,
          interactive: true
        }).addTo(map);

        polygon.on("click", () => selectCountry(key, true));

        layers[key] = polygon;
        createCountryLabel(key, c);
      });

      selectCountry("israel", false);
    }

    toggleMapViewBtn.addEventListener("click", () => {
      app.classList.toggle("map-focus");
      const isExpanded = app.classList.contains("map-focus");
      toggleMapViewBtn.textContent = isExpanded ? "↩️ חזרה לתצוגה רגילה" : "🗺️ מצב מפה מורחב";
      setTimeout(() => map.invalidateSize(), 260);
    });

    searchInput.addEventListener("change", () => {
      const key = findCountryBySearch(searchInput.value);
      if (key) selectCountry(key, true);
    });

    searchInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter") {
        const key = findCountryBySearch(searchInput.value);
        if (key) selectCountry(key, true);
      }
    });

    renderButtons();
    renderSearchOptions();
    renderInfo("israel");
    initMap();
  </script>
</body>
</html>
